# 群晖 NAS Docker 部署配置（统一镜像版）
# 使用 GitHub Container Registry 预构建镜像
#
# ═══════════════════════════════════════════
# 超快速部署（1 条命令）
# ═══════════════════════════════════════════
# 
# cd /volume1/docker/feishu-bot
# docker compose -f docker-compose.synology.yml pull
# docker compose -f docker-compose.synology.yml up -d
#
# ✅ 然后访问：http://你的群晖IP:45173
# ✅ 初始账号：admin / admin
#
# ═══════════════════════════════════════════
# 【可选】自定义配置
# ═══════════════════════════════════════════
# 
# 如需修改前端端口或添加飞书 Webhook，创建 .env 文件：
#
#   APP_PORT=45173          # 前端端口，如已占用可改为其他
#   FEISHU_WEBHOOK_URL=https://open.feishu.cn/open-apis/bot/v2/hook/...
#   JWT_SECRET=your-strong-secret-key-here
#
# 不创建 .env 文件也可以，应用会使用内置默认值启动。
# 飞书 Webhook 可在完成登录后于系统内部添加。
#
# 网络受限？见：docs/SYNOLOGY_OFFLINE_DEPLOYMENT.md
# ═══════════════════════════════════════════
# 升级版本
# ═══════════════════════════════════════════
#
#   docker compose -f docker-compose.synology.yml pull
#   docker compose -f docker-compose.synology.yml up -d
#
# ═══════════════════════════════════════════

services:
  app:
    image: ghcr.io/fuck996/feishu-bot:${IMAGE_TAG:-latest}
    container_name: feishu-bot
    ports:
      - "${APP_PORT:-45173}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      DATABASE_PATH: /app/data/notifications.db
      CORS_ORIGIN: "*"
      LOG_LEVEL: info
      BACKEND_URL: http://${NAS_HOSTNAME:-localhost}:${APP_PORT:-45173}
      TZ: Asia/Shanghai
    volumes:
      # ✅ 数据持久化到主机路径（而非 Docker 命名卷）
      # 数据将存储在 docker-compose.yml 所在目录的 data/ 子目录中
      # 通常为 /volume1/docker/feishu-bot/data
      # 即使容器或镜像删除，数据也会保留在主机上
      - ./data:/app/data
    networks:
      - feishu-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

networks:
  feishu-net:
    driver: bridge
