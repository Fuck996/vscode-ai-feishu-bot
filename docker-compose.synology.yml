# 群晖 NAS Docker 部署配置（零配置版）
# 使用 GitHub Container Registry 预构建镜像，一条命令启动
#
# ═══════════════════════════════════════════
# 超快速部署（1 条命令）
# ═══════════════════════════════════════════
# 
# cd /volume1/docker/feishu-bot
# docker compose -f docker-compose.synology.yml pull
# docker compose -f docker-compose.synology.yml up -d
#
# ✅ 然后访问：http://你的群晖IP:8080
# ✅ 初始账号：admin / admin
#
# ═══════════════════════════════════════════
# 【可选】自定义配置
# ═══════════════════════════════════════════
# 
# 如需修改前端端口或添加飞书 Webhook，创建 .env 文件：
#
#   APP_PORT=8080
#   FEISHU_WEBHOOK_URL=https://open.feishu.cn/open-apis/bot/v2/hook/...
#
# 不创建 .env 文件也可以，应用会使用内置默认值启动。
# 飞书 Webhook 可在完成登录后于系统内部添加。
#
# ═══════════════════════════════════════════
# 升级版本
# ═══════════════════════════════════════════
#
#   docker compose -f docker-compose.synology.yml pull
#   docker compose -f docker-compose.synology.yml up -d
#
# ═══════════════════════════════════════════

services:
  backend:
    image: ghcr.io/fuck996/feishu-bot-backend:latest
    container_name: feishu-bot-backend
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      FEISHU_WEBHOOK_URL: ${FEISHU_WEBHOOK_URL}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      DATABASE_PATH: /app/data/notifications.db
      CORS_ORIGIN: "*"
      LOG_LEVEL: info
      BACKEND_URL: http://localhost:${APP_PORT:-8080}
    volumes:
      - feishu-data:/app/data
    networks:
      - feishu-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    image: ghcr.io/fuck996/feishu-bot-frontend:latest
    container_name: feishu-bot-frontend
    ports:
      - "${APP_PORT:-8080}:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - feishu-net
    restart: unless-stopped

volumes:
  feishu-data:
    driver: local

networks:
  feishu-net:
    driver: bridge
