# 群晖 NAS Docker 部署配置（简化版）
# 使用 GitHub Container Registry 预构建镜像，一条命令启动
#
# ═══════════════════════════════════════════
# 快速开始（3步）
# ═══════════════════════════════════════════
#
# 1️⃣  创建 .env 文件（以下内容复制到群晖 /volume1/docker/feishu-bot/.env）
#
#     # 飞书机器人 Webhook URL（必须）
#     FEISHU_WEBHOOK_URL=https://open.feishu.cn/open-apis/bot/v2/hook/你的webhook-id
#     
#     # JWT 签名密钥（必须，可自定义任意字符串）
#     JWT_SECRET=your-secret-key-12345
#     
#     # （可选）修改前端访问端口，默认 8080
#     APP_PORT=8080
#
# 2️⃣  在群晖 SSH 中运行
#
#     cd /volume1/docker/feishu-bot
#     docker compose -f docker-compose.synology.yml pull
#     docker compose -f docker-compose.synology.yml up -d
#
# 3️⃣  访问应用
#
#     http://你的群晖IP:8080
#     初始账号：admin / admin （首次登录强制修改密码）
#
# ═══════════════════════════════════════════
# 更新版本
# ═══════════════════════════════════════════
#
#     docker compose -f docker-compose.synology.yml pull
#     docker compose -f docker-compose.synology.yml up -d
#
# ═══════════════════════════════════════════

services:
  backend:
    image: ghcr.io/Fuck996/feishu-bot-backend:latest
    container_name: feishu-bot-backend
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      FEISHU_WEBHOOK_URL: ${FEISHU_WEBHOOK_URL}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      DATABASE_PATH: /app/data/notifications.db
      CORS_ORIGIN: "*"
      LOG_LEVEL: info
      BACKEND_URL: http://localhost:${APP_PORT:-8080}
    volumes:
      - feishu-data:/app/data
    networks:
      - feishu-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    image: ghcr.io/Fuck996/feishu-bot-frontend:latest
    container_name: feishu-bot-frontend
    ports:
      - "${APP_PORT:-8080}:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - feishu-net
    restart: unless-stopped

volumes:
  feishu-data:
    driver: local

networks:
  feishu-net:
    driver: bridge
