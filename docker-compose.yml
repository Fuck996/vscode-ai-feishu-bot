version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: feishu-bot-backend
    # 后端不暴露端口 - 只在内部网络中通过服务名访问
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      FEISHU_WEBHOOK_URL: ${FEISHU_WEBHOOK_URL}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key-change-in-production}
      DATABASE_PATH: /app/data/notifications.db
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      BACKEND_URL: ${BACKEND_URL:-http://localhost:${APP_PORT:-8080}}
    volumes:
      - ./data:/app/data   # 只映射这一个目录，数据不丢失
    networks:
      - feishu-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: feishu-bot-frontend
    ports:
      - "${APP_PORT:-8080}:3000"   # 只暴露前端，通过反代访问
    depends_on:
      - backend
    networks:
      - feishu-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'

networks:
  feishu-net:
    driver: bridge
