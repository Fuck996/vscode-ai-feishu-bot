name: 构建并发布 Docker 镜像

# 触发时机：在 GitHub 上创建 Release（打 Tag 后 Publish）或手动触发
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      image_tag:
        description: '镜像标签（如 v1.3.2 或 latest）'
        required: true
        default: 'latest'

env:
  REGISTRY: ghcr.io

jobs:
  # ─────────────────────────────────────────
  # 构建统一镜像（前后端合并）
  # ─────────────────────────────────────────
  build:
    name: 构建统一镜像
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      max-parallel: 1  # 顺序构建，避免并发冲突

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取完整历史以支持版本标签

      - name: 检验 Dockerfile 存在性
        run: |
          if [ ! -f Dockerfile ]; then
            echo "❌ Dockerfile 不存在于项目根目录"
            exit 1
          fi
          echo "✅ Dockerfile 已确认存在"

      - name: 登录 GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-options: |
            image=moby/buildkit:master

      - name: 生成镜像标签和标注
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/feishu-bot
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.event_name == 'release' }}
            type=raw,value=${{ github.event.inputs.image_tag }},enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: 构建并推送统一镜像
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1

      - name: 镜像构建成功
        run: echo "✅ Docker 镜像已成功构建并推送到 ${{ env.REGISTRY }}"


