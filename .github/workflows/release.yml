name: 构建并发布 Docker 镜像

# 触发时机：在 GitHub 上创建 Release（打 Tag 后 Publish）或手动触发
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      image_tag:
        description: '镜像标签（如 v1.3.2 或 latest）'
        required: true
        default: 'latest'
      build_title:
        description: '构建标题/说明（可选）'
        required: false
        default: '构建并发布 Docker 镜像'
      build_description:
        description: '构建描述（可选，详细说明）'
        required: false
        default: '自动构建 Docker 镜像并推送到 GitHub Container Registry'
      notify_on_completion:
        description: '完成后发送通知？'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      push_to_registry:
        description: '是否推送到 Registry？（false 则仅构建不推送，用于测试）'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

env:
  REGISTRY: ghcr.io

jobs:
  # ─────────────────────────────────────────
  # 构建统一镜像（前后端合并）
  # ─────────────────────────────────────────
  build:
    name: 构建统一镜像
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      max-parallel: 1  # 顺序构建，避免并发冲突

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取完整历史以支持版本标签

      - name: 输出构建信息
        run: |
          echo "════════════════════════════════════════"
          echo "🏗️  构建信息"
          echo "════════════════════════════════════════"
          echo "📌 标题：${{ github.event.inputs.build_title || '自动发布构建' }}"
          echo "📝 描述：${{ github.event.inputs.build_description || '无' }}"
          echo "🏷️  镜像标签：${{ github.event.inputs.image_tag || github.ref_name }}"
          echo "📤 推送到 Registry：${{ github.event.inputs.push_to_registry || 'true' }}"
          echo "🔔 完成后通知：${{ github.event.inputs.notify_on_completion || 'true' }}"
          echo "🔄 触发事件：${{ github.event_name }}"
          echo "════════════════════════════════════════"

      - name: 检验 Dockerfile 存在性
        run: |
          if [ ! -f Dockerfile ]; then
            echo "❌ Dockerfile 不存在于项目根目录"
            exit 1
          fi
          echo "✅ Dockerfile 已确认存在"

      - name: 登录 GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-options: |
            image=moby/buildkit:master

      - name: 生成镜像标签和标注
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/feishu-bot
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.event_name == 'release' }}
            type=raw,value=${{ github.event.inputs.image_tag }},enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: 构建并推送统一镜像
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event.inputs.push_to_registry != 'false' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1

      - name: 构建完成（推送模式：${{ github.event.inputs.push_to_registry || 'true' }}）
        run: |
          if [ "${{ github.event.inputs.push_to_registry }}" = "false" ]; then
            echo "✅ Docker 镜像已成功构建（仅本地，未推送到 Registry）"
          else
            echo "✅ Docker 镜像已成功构建并推送到 ${{ env.REGISTRY }}"
            echo ""
            echo "📦 推送信息："
            echo "  镜像标签：${{ github.event.inputs.image_tag || github.ref_name }}"
            echo "  Registry：${{ env.REGISTRY }}"
            echo "  仓库：${{ github.repository_owner }}/feishu-bot"
          fi

      - name: 发送完成通知（可选）
        if: ${{ github.event.inputs.notify_on_completion != 'false' && always() }}
        run: |
          BUILD_STATUS=${{ job.status }}
          if [ "$BUILD_STATUS" = "success" ]; then
            STATUS_EMOJI="✅"
            STATUS_TEXT="成功"
          else
            STATUS_EMOJI="❌"
            STATUS_TEXT="失败"
          fi
          
          echo "${STATUS_EMOJI} Docker 镜像构建 ${STATUS_TEXT}"
          echo ""
          echo "构建详情："
          echo "  标题：${{ github.event.inputs.build_title || '自动构建' }}"
          echo "  状态：${STATUS_TEXT}"
          echo "  标签：${{ github.event.inputs.image_tag || github.ref_name }}"
          echo "  事件：${{ github.event_name }}"


