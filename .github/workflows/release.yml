name: 构建并发布 Docker 镜像

# 触发时机：在 GitHub 上创建 Release（打 Tag 后 Publish）
on:
  release:
    types: [published]

env:
  REGISTRY: ghcr.io

jobs:
  # ─────────────────────────────────────────
  # 构建后端镜像
  # ─────────────────────────────────────────
  build-backend:
    name: 后端镜像
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 登录 GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 设置构建缓存
        uses: docker/setup-buildx-action@v3

      - name: 生成镜像标签和标注
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/feishu-bot-backend
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: 构建并推送后端镜像
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────
  # 构建前端镜像
  # ─────────────────────────────────────────
  build-frontend:
    name: 前端镜像
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 登录 GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 设置构建缓存
        uses: docker/setup-buildx-action@v3

      - name: 生成镜像标签和标注
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/feishu-bot-frontend
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: 构建并推送前端镜像
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────
  # 通知飞书：发布完成
  # ─────────────────────────────────────────
  notify:
    name: 发布通知
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    if: always()

    steps:
      - name: 发送飞书通知
        if: ${{ env.FEISHU_WEBHOOK_URL != '' }}
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        run: |
          STATUS="${{ needs.build-backend.result == 'success' && needs.build-frontend.result == 'success' && '✅ 成功' || '❌ 失败' }}"
          VERSION="${{ github.event.release.tag_name }}"
          OWNER="${{ github.repository_owner }}"
          curl -s -X POST "$FEISHU_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"msg_type\": \"text\",
              \"content\": {
                \"text\": \"🐳 Docker 镜像发布 ${STATUS}\n版本：${VERSION}\n镜像：\nghcr.io/${OWNER}/feishu-bot-backend:${VERSION}\nghcr.io/${OWNER}/feishu-bot-frontend:${VERSION}\"
              }
            }"
