name: Build and Publish Docker Images to GHCR

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

env:
  IMAGE_REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}
  SHA_TAG: ${{ github.sha }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          file: ./backend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_REGISTRY }}/${{ env.OWNER }}/vscode-ai-feishu-bot-backend:latest
            ${{ env.IMAGE_REGISTRY }}/${{ env.OWNER }}/vscode-ai-feishu-bot-backend:${{ env.SHA_TAG }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.prod
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_REGISTRY }}/${{ env.OWNER }}/vscode-ai-feishu-bot-frontend:latest
            ${{ env.IMAGE_REGISTRY }}/${{ env.OWNER }}/vscode-ai-feishu-bot-frontend:${{ env.SHA_TAG }}

      - name: Output images
        run: |
          echo "Backend: ${{ env.IMAGE_REGISTRY }}/${{ env.OWNER }}/vscode-ai-feishu-bot-backend:latest"
          echo "Frontend: ${{ env.IMAGE_REGISTRY }}/${{ env.OWNER }}/vscode-ai-feishu-bot-frontend:latest"
